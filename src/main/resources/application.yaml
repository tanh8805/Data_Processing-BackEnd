spring:
  profiles:
    active: secret
  application:
    name: data_processing-be
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false

  datasource:
    url: jdbc:postgresql://${DB_HOST}:5432/data_processing_be
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}

jwt:
  secret: ${JWT_SECRET}
  expiration: ${JWT_EXPIRATION}
  
upload:
  dir: ${UPLOAD_DIR}

python:
  api:
    url: ${PYTHON_API_URL}

server:
  port: 8080